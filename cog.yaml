build:
  gpu: true
  cuda: "11.8"
  python_version: "3.10"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "ffmpeg"
  python_packages:
    - "torch==2.1.0"
    - "torchvision==0.16.0"
    - "numpy<2"
    - "scipy"
    - "pillow"
    - "opencv-python"
    - "imageio"
    - "imageio-ffmpeg"
    - "einops"
    - "timm"
    - "tqdm"
    - "scikit-image"
    - "matplotlib"
    - "av"

predict: "predict.py:Predictor"