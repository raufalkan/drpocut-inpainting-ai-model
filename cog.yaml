build:
  gpu: true
  cuda: "11.8"
  python_version: "3.10"
  system_packages:
    - "libgl1-mesa-glx"
    - "libglib2.0-0"
    - "ffmpeg"
  python_packages:
    - "torch==2.1.0"
    - "torchvision==0.16.0"
    - "numpy<2"
    - "scipy"
    - "pillow"
    - "opencv-python"
    - "imageio"
    - "imageio-ffmpeg"
    - "einops"
    - "timm"
    - "tqdm"
    - "scikit-image"
    - "matplotlib"
    - "av"
  run:
    - "mkdir -p weights/propainter"
    - "curl -L --retry 3 -o weights/propainter/raft-things.pth https://github.com/sczhou/ProPainter/releases/download/v0.1.0/raft-things.pth"
    - "curl -L --retry 3 -o weights/propainter/recurrent_flow_completion.pth https://github.com/sczhou/ProPainter/releases/download/v0.1.0/recurrent_flow_completion.pth"
    - "curl -L --retry 3 -o weights/propainter/ProPainter.pth https://github.com/sczhou/ProPainter/releases/download/v0.1.0/ProPainter.pth"

predict: "predict.py:Predictor"
